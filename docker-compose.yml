services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: api_barleys
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: api_barleys
    volumes:
      - db_data:/var/lib/postgresql/data

  app:
    build: .
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PORT: 3333
      DATABASE_URL: postgresql://api_barleys:${POSTGRES_PASSWORD}@db:5432/api_barleys?schema=public
      API_KEY: ${API_KEY}
      WEBHOOK_URL: ${WEBHOOK_URL}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
    ports:
      - "3333:3333"
    command: sh -c "npx prisma db push --skip-generate --accept-data-loss && node dist/index.js"

volumes:
  db_data:
